<html lang="en">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        /* 🎨 THEME VARIABLES */
        :root {
            --bg-gradient: radial-gradient(circle at center, #1b1b3a 0%, #080811 100%);
            --card-bg: #232342;
            --text-color: #ffffff;
            --border-color: #ffaa00; /* 🟡 GOLD OUTLINE */
            --shadow-color: rgba(255, 170, 0, 0.4); /* 🟡 GOLD SHADOW */
            --mj-bg: rgba(255, 0, 0, 0.2);
            --sonic-bg: rgba(0, 84, 180, 0.25);
            --rose-bg: #421c3b;
        }

        [data-theme="light"] {
            --bg-gradient: radial-gradient(circle at center, #e2e8f0 0%, #cbd5e1 100%);
            --card-bg: #ffffff;
            --text-color: #080811;
            --border-color: #ffaa00;
            --shadow-color: rgba(255, 170, 0, 0.3);
            --mj-bg: rgba(255, 0, 0, 0.1);
            --sonic-bg: rgba(0, 84, 180, 0.1);
            --rose-bg: #fff0f5;
        }

        /* 🌌 GLOBAL COMIC SANS MS BOLD STYLING */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Comic Sans', 'Fredoka One', cursive, sans-serif !important;
            font-weight: 900 !important;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body {
            background: var(--bg-gradient) !important;
            color: var(--text-color) !important;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 🔘 THREE-DOTS INTERACTIVE MENU */
        .settings-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .three-dots-btn {
            background: #ffaa00;
            color: #000;
            border: 4px solid #000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 4px 4px 0px #000;
            outline: none;
        }
